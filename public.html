<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatFlow 💬</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; display: flex; height: 100vh; }

    /* Sidebar */
    .sidebar { width: 240px; background: #16213e; display: flex; flex-direction: column; border-right: 1px solid #0f3460; }
    .sidebar-header { padding: 20px; background: #0f3460; font-size: 20px; font-weight: bold; color: #00d4ff; }
    .sidebar-header span { font-size: 13px; color: #aaa; display: block; margin-top: 4px; }
    .room-list { padding: 12px 0; flex: 1; overflow-y: auto; }
    .room-item { padding: 10px 20px; cursor: pointer; color: #aaa; font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .room-item:hover, .room-item.active { background: #0f3460; color: #00d4ff; }
    .room-item::before { content: '#'; color: #555; }
    .room-item.active::before { color: #00d4ff; }
    .online-status { padding: 12px 20px; font-size: 12px; color: #555; border-top: 1px solid #0f3460; }
    .online-dot { display: inline-block; width: 8px; height: 8px; background: #00ff88; border-radius: 50%; margin-right: 6px; }

    /* Chat Area */
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    .chat-header { padding: 16px 24px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; align-items: center; justify-content: space-between; }
    .chat-header h2 { font-size: 16px; color: #00d4ff; }
    .chat-header span { font-size: 12px; color: #666; }
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
    .status-ok { background: #00ff8822; color: #00ff88; border: 1px solid #00ff88; }
    .status-error { background: #ff444422; color: #ff4444; border: 1px solid #ff4444; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .message { display: flex; gap: 12px; align-items: flex-start; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; flex-shrink: 0; }
    .message-body { flex: 1; }
    .message-meta { font-size: 12px; color: #666; margin-bottom: 4px; }
    .message-meta strong { color: #00d4ff; margin-right: 8px; }
    .message-text { background: #16213e; padding: 10px 14px; border-radius: 0 12px 12px 12px; font-size: 14px; line-height: 1.5; color: #ddd; max-width: 600px; }
    .system-message { text-align: center; font-size: 12px; color: #555; padding: 4px; }
    .error-message .message-text { background: #ff444411; border: 1px solid #ff444444; color: #ff8888; }

    /* Input */
    .chat-input { padding: 16px 24px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 12px; align-items: center; }
    .chat-input input { flex: 1; background: #0f3460; border: 1px solid #1a4080; color: #eee; padding: 10px 16px; border-radius: 24px; font-size: 14px; outline: none; }
    .chat-input input:focus { border-color: #00d4ff; }
    .chat-input input::placeholder { color: #555; }
    .send-btn { background: #00d4ff; color: #000; border: none; padding: 10px 20px; border-radius: 24px; cursor: pointer; font-weight: bold; font-size: 14px; }
    .send-btn:hover { background: #00b8d9; }
    .send-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

    /* User selector */
    .user-selector { padding: 12px 20px; border-top: 1px solid #0f3460; }
    .user-selector select { width: 100%; background: #0f3460; color: #eee; border: 1px solid #1a4080; padding: 6px 10px; border-radius: 6px; font-size: 13px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f3460; }
    ::-webkit-scrollbar-thumb { background: #1a4080; border-radius: 3px; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    💬 ChatFlow
    <span>Real-time messaging</span>
  </div>
  <div class="room-list" id="roomList"></div>
  <div class="user-selector">
    <select id="userSelect">
      <option value="alice">👤 alice</option>
      <option value="bob">👤 bob</option>
      <option value="charlie">👤 charlie</option>
      <option value="diana">👤 diana</option>
      <option value="eve">👤 eve</option>
    </select>
  </div>
  <div class="online-status">
    <span class="online-dot"></span>
    <span id="connStatus">Connecting...</span>
  </div>
</div>

<div class="chat-area">
  <div class="chat-header">
    <div>
      <h2 id="roomName"># general</h2>
      <span id="memberCount">Loading...</span>
    </div>
    <span class="status-badge status-ok" id="appStatus">● LIVE</span>
  </div>
  <div class="messages" id="messages"></div>
  <div class="chat-input">
    <input type="text" id="msgInput" placeholder="Message #general..." maxlength="500" />
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  let currentRoom = 'general';
  let ws;
  const colors = ['#ff6b6b','#ffa502','#2ed573','#1e90ff','#ff4757','#00d4ff','#a29bfe','#fd79a8'];
  const userColors = {};

  function getColor(username) {
    if (!userColors[username]) {
      userColors[username] = colors[Object.keys(userColors).length % colors.length];
    }
    return userColors[username];
  }

  function getInitials(name) {
    return name.slice(0, 2).toUpperCase();
  }

  // Load rooms
  async function loadRooms() {
    const res = await fetch('/api/rooms');
    const data = await res.json();
    const list = document.getElementById('roomList');
    list.innerHTML = data.rooms.map(r => `
      <div class="room-item ${r.name === currentRoom ? 'active' : ''}"
           onclick="switchRoom('${r.name}')">
        ${r.name}
      </div>
    `).join('');
  }

  // Switch room
  async function switchRoom(room) {
    currentRoom = room;
    document.getElementById('roomName').textContent = `# ${room}`;
    document.getElementById('msgInput').placeholder = `Message #${room}...`;
    loadRooms();
    loadMessages();
  }

  // Load message history
  async function loadMessages() {
    try {
      const res = await fetch(`/api/messages/${currentRoom}`);
      if (!res.ok) {
        addSystemMessage('⚠️ Failed to load messages — database may be unavailable', true);
        return;
      }
      const data = await res.json();
      const container = document.getElementById('messages');
      container.innerHTML = '';
      data.messages.forEach(m => addMessage(m.username, m.content, m.room, m.created_at));
      container.scrollTop = container.scrollHeight;
    } catch (err) {
      addSystemMessage('⚠️ Connection error loading messages', true);
    }
  }

  // Connect WebSocket
  function connectWS() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}`);

    ws.onopen = () => {
      document.getElementById('connStatus').textContent = '5 online';
      addSystemMessage('✅ Connected to ChatFlow');
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.type === 'message' && data.room === currentRoom) {
        addMessage(data.username, data.content, data.room, data.timestamp);
      }
      if (data.error) {
        addSystemMessage(`⚠️ Error: ${data.error}`, true);
        updateStatus(false);
      }
    };

    ws.onclose = () => {
      document.getElementById('connStatus').textContent = '● Disconnected';
      addSystemMessage('🔴 Disconnected from server — attempting reconnect...', true);
      updateStatus(false);
      setTimeout(connectWS, 3000);
    };

    ws.onerror = () => {
      addSystemMessage('❌ WebSocket error — service may be degraded', true);
      updateStatus(false);
    };
  }

  // Add message to UI
  function addMessage(username, content, room, timestamp) {
    const container = document.getElementById('messages');
    const color = getColor(username);
    const time = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const div = document.createElement('div');
    div.className = 'message';
    div.innerHTML = `
      <div class="avatar" style="background:${color}22;color:${color};border:1px solid ${color}44">
        ${getInitials(username)}
      </div>
      <div class="message-body">
        <div class="message-meta">
          <strong style="color:${color}">${username}</strong>${time}
        </div>
        <div class="message-text">${content}</div>
      </div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function addSystemMessage(text, isError = false) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'system-message';
    div.style.color = isError ? '#ff6666' : '#555';
    div.textContent = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function updateStatus(ok) {
    const badge = document.getElementById('appStatus');
    badge.textContent = ok ? '● LIVE' : '● DEGRADED';
    badge.className = `status-badge ${ok ? 'status-ok' : 'status-error'}`;
  }

  // Send message
  function sendMessage() {
    const input = document.getElementById('msgInput');
    const username = document.getElementById('userSelect').value;
    const content = input.value.trim();
    if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ username, room: currentRoom, content }));
    input.value = '';
  }

  document.getElementById('msgInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });

  // Poll health
  setInterval(async () => {
    try {
      const res = await fetch('/health');
      const data = await res.json();
      updateStatus(data.status === 'ok');
      document.getElementById('memberCount').textContent =
        `${data.active_connections} online · ${data.message_rate} msg/min`;
    } catch { updateStatus(false); }
  }, 3000);

  // Init
  loadRooms();
  loadMessages();
  connectWS();
</script>
</body>
</html>
